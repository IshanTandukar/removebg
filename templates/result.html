<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Result</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="result-container">
      <h1>Background Removed</h1>

      <div class="comparison">
        <div class="image-card">
          <h2>Original</h2>
          <!-- <img src="{{ url_for('static_uploads', filename=original) }}" /> -->
          <img src="/uploads/{{ original }}" />
        </div>

        <div class="image-card">
          <h2>Processed</h2>
          <!-- <img src="{{ url_for('static_uploads', filename=processed) }}" /> -->
          <img src="/uploads/{{ processed }}" />
        </div>
      </div>

      <a
        href="{{ url_for('download', filename=processed) }}"
        class="download-btn"
      >
        Download Image
      </a>

      <a href="/" class="back-btn"> Remove Another Image </a>
    </div>
  </body>
</html>
